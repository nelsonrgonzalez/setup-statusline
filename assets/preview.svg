<svg xmlns="http://www.w3.org/2000/svg" width="900" height="92">
  <!-- Terminal window background -->
  <rect width="900" height="92" fill="#1e1e2e" rx="8"/>
  <!-- Subtle inner glow border -->
  <rect x="1" y="1" width="898" height="90" fill="none" stroke="#313244" stroke-width="1" rx="7"/>

  <!-- LINE 1 background regions -->
  <!-- Blue location section background -->
  <rect x="0" y="0" width="418" height="29" fill="#1d3557" rx="7 0 0 0"/>

  <!-- LINE 3 background regions -->
  <!-- Magenta tokens section background -->
  <rect x="10" y="62" width="204" height="22" fill="#3b2456" rx="3"/>
  <!-- Dark gray cache section background -->
  <rect x="237" y="62" width="160" height="22" fill="#313244" rx="3"/>
  <!-- White cost section background -->
  <rect x="420" y="62" width="294" height="22" fill="#f8f8f2" rx="3"/>

  <!-- LINE 1: location │ git │ model+badges -->
  <text y="20" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13" xml:space="preserve">
